# Razer Barracuda 2.4 mic anti-crackle (minimal/safe).
# USB 1.1 full-speed wireless mic. ONLY safe tweak: never suspend the capture
# node, so it doesn't pop/crackle on resume when an app opens the mic.
# Do NOT force api.alsa.period-size/period-num here: forcing non-native period
# sizes on a USB full-speed device garbles the isochronous packing (made it
# worse). Let PipeWire auto-negotiate the device's native periods.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_input.usb-Macronix_Razer_Barracuda_2.4_1234-00.mono-fallback" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.pause-on-idle              = false
      }
    }
  }
]
