# Razer Barracuda 2.4 anti-crackle / anti-dropout (USB 1.1 full-speed + 2.4GHz).
# Never suspend the capture OR playback node: this device is wireless, and every
# idle->resume re-inits the USB audio clock (set/get sample rate on the iso
# endpoint). On a flaky 2.4GHz link that re-init is exactly when the kernel logs
# "cannot get freq at ep" and the audio drops for ~1s. Keeping both streams
# always-on removes that whole class of drop (the start-after-silence one).
# NOTE: does NOT stop actual RF packet loss mid-stream -- that's physical (dongle
# placement, 2.4GHz Wi-Fi channel). For riding through brief RF stalls, raise the
# PipeWire quantum (98-low-latency.conf) at the cost of latency.
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_input.usb-Macronix_Razer_Barracuda_2.4_1234-00.mono-fallback" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.pause-on-idle              = false
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.usb-Macronix_Razer_Barracuda_2.4_1234-00.analog-stereo" }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        node.pause-on-idle              = false
        # ~32ms output cushion (frames @48k): rides through brief 2.4GHz packet
        # stalls so they don't starve the DAC into an audible drop. Output-only,
        # so gaming/control latency (PipeWire quantum) is untouched.
        api.alsa.headroom               = 1536
      }
    }
  }
]
