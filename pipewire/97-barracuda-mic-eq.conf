# Razer Barracuda 2.4 mic 10-band EQ -> virtual source "Barracuda Mic (clean)".
# Fixed 75Hz high-pass kills the rumble/plosive energy that distorts ("brr"),
# then 10 adjustable bands (mic0..mic9) for tone shaping, driven live from the
# GUI via pw-cli set-param (same mechanism as the headphone EQ). Default gains
# below are the "Clarity" preset. Apps select "Barracuda Mic (clean)" as input.
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Barracuda Mic (clean)"
      media.name       = "Barracuda Mic (clean)"
      filter.graph = {
        nodes = [
          { type = builtin label = bq_highpass  name = hp   control = { "Freq" = 75    "Q" = 0.7 } }
          { type = builtin label = bq_lowshelf  name = mic0 control = { "Freq" = 100   "Q" = 0.7  "Gain" = -6.0 } }
          { type = builtin label = bq_peaking   name = mic1 control = { "Freq" = 200   "Q" = 1.0  "Gain" = -4.0 } }
          { type = builtin label = bq_peaking   name = mic2 control = { "Freq" = 300   "Q" = 1.0  "Gain" = -2.0 } }
          { type = builtin label = bq_peaking   name = mic3 control = { "Freq" = 500   "Q" = 1.0  "Gain" = -1.0 } }
          { type = builtin label = bq_peaking   name = mic4 control = { "Freq" = 800   "Q" = 1.0  "Gain" = 0.0 } }
          { type = builtin label = bq_peaking   name = mic5 control = { "Freq" = 1500  "Q" = 1.0  "Gain" = 1.0 } }
          { type = builtin label = bq_peaking   name = mic6 control = { "Freq" = 3000  "Q" = 1.0  "Gain" = 2.0 } }
          { type = builtin label = bq_peaking   name = mic7 control = { "Freq" = 5000  "Q" = 1.0  "Gain" = 2.0 } }
          { type = builtin label = bq_peaking   name = mic8 control = { "Freq" = 8000  "Q" = 1.0  "Gain" = 1.0 } }
          { type = builtin label = bq_highshelf name = mic9 control = { "Freq" = 12000 "Q" = 0.7  "Gain" = 0.0 } }
        ]
        links = [
          { output = "hp:Out"   input = "mic0:In" }
          { output = "mic0:Out" input = "mic1:In" }
          { output = "mic1:Out" input = "mic2:In" }
          { output = "mic2:Out" input = "mic3:In" }
          { output = "mic3:Out" input = "mic4:In" }
          { output = "mic4:Out" input = "mic5:In" }
          { output = "mic5:Out" input = "mic6:In" }
          { output = "mic6:Out" input = "mic7:In" }
          { output = "mic7:Out" input = "mic8:In" }
          { output = "mic8:Out" input = "mic9:In" }
        ]
        inputs  = [ "hp:In" ]
        outputs = [ "mic9:Out" ]
      }
      capture.props = {
        node.name    = "barracuda_mic_in"
        node.passive = true
        node.target  = "alsa_input.usb-Macronix_Razer_Barracuda_2.4_1234-00.mono-fallback"
        audio.channels = 1
        audio.position = [ MONO ]
        stream.dont-remix = true
      }
      playback.props = {
        node.name   = "barracuda_mic"
        media.class = Audio/Source
        audio.channels = 1
        audio.position = [ MONO ]
      }
    }
  }
]
